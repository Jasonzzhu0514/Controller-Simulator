<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>预测控制与反馈控制模拟器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-top">
        <div>
          <h1 data-i18n="appTitle">预测控制与反馈控制模拟器</h1>
          <div class="subtitle" data-i18n="appSubtitle">NMPC/MPC 基于模型滚动预测优化；LQR/PID 作为当前状态反馈基线。</div>
        </div>
        <div class="header-actions">
          <button id="infoBtn" class="tool-button" type="button" aria-haspopup="dialog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 16v-4"></path>
              <path d="M12 8h.01"></path>
            </svg>
            <span data-i18n="infoButton">说明</span>
          </button>
          <label class="language-control" aria-label="Language">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M2 12h20"></path>
              <path d="M12 2a15.3 15.3 0 0 1 0 20"></path>
              <path d="M12 2a15.3 15.3 0 0 0 0 20"></path>
            </svg>
            <select id="languageSelect">
              <option value="zh-CN">简体中文</option>
              <option value="en">English</option>
              <option value="zh-TW">繁體中文</option>
              <option value="ja">日本語</option>
              <option value="ru">Русский</option>
            </select>
          </label>
        </div>
      </div>
    </header>

    <main>
      <section class="stage">
        <div class="toolbar">
          <div>
            <strong id="modeTitle">NMPC</strong>
            <span class="subtitle" id="statusText"> 运行中</span>
          </div>
          <div class="toolbar-actions">
            <label class="speed-control">
              <span data-i18n="speed">倍速</span>
              <input id="speed" type="range" min="0.25" max="8" step="0.25" value="1">
              <span class="value" id="speedLabel">1.0x</span>
            </label>
            <div class="buttons">
              <button id="pauseBtn" class="primary" data-i18n="pause">暂停</button>
              <button id="resetBtn" data-i18n="reset">重置</button>
            </div>
          </div>
        </div>

        <div class="metrics">
          <div class="metric"><label data-i18n="metricX">位置 x</label><strong id="xValue">0.00</strong></div>
          <div class="metric"><label data-i18n="metricV">速度 v</label><strong id="vValue">0.00</strong></div>
          <div class="metric"><label data-i18n="metricU">控制 u</label><strong id="uValue">0.00</strong></div>
          <div class="metric"><label data-i18n="metricCost">代价 cost</label><strong id="costValue">0.00</strong></div>
          <div class="metric"><label data-i18n="metricCandidates">候选数</label><strong id="candValue">0</strong></div>
        </div>

        <div class="canvas-wrap">
          <canvas id="world"></canvas>
          <canvas id="chart"></canvas>
          <div class="flow-panel">
            <div class="flow-head">
              <span data-i18n="flowTitle">实时控制流</span>
              <span id="flowDetail" class="flow-detail" data-i18n="waiting">等待数据</span>
            </div>
            <div id="flowNodes" class="flow-nodes"></div>
          </div>
        </div>
      </section>

      <aside class="controls">
        <div class="mode">
          <button id="nmpcMode" class="active">NMPC</button>
          <button id="mpcMode">MPC</button>
          <button id="lqrMode">LQR</button>
          <button id="pidMode">PID</button>
        </div>

        <div class="buttons">
          <button id="resetParamsBtn" data-i18n="resetParams">重置参数</button>
          <button id="resetAllBtn" data-i18n="resetAll">重置全部</button>
        </div>

        <div class="control-group">
          <div class="group-title" data-i18n="sceneParams">场景参数</div>
          <div class="compact-grid">
            <div class="control-row">
              <label><span data-i18n="targetPosition">目标位置</span> <span class="value" id="targetLabel">10.0</span></label>
              <input id="target" type="range" min="-12" max="12" step="0.1" value="10">
            </div>
            <div class="control-row">
              <label><span data-i18n="drag">真实阻力</span> <span class="value" id="dragLabel">0.08</span></label>
              <input id="drag" type="range" min="0" max="0.35" step="0.01" value="0.08">
            </div>
            <div class="control-row">
              <label><span data-i18n="slowStart">限速起点</span> <span class="value" id="slowStartLabel">7.0</span></label>
              <input id="slowStart" type="range" min="-12" max="12" step="0.1" value="7">
            </div>
            <div class="control-row">
              <label><span data-i18n="slowSpeed">限速上限</span> <span class="value" id="slowSpeedLabel">0.80</span></label>
              <input id="slowSpeed" type="range" min="0.2" max="3" step="0.05" value="0.8">
            </div>
            <div class="control-row">
              <label><span data-i18n="slowWeight">限速惩罚</span> <span class="value" id="slowWeightLabel">16.0</span></label>
              <input id="slowWeight" type="range" min="0" max="50" step="1" value="16">
            </div>
          </div>
        </div>

        <div id="predictiveControls" class="control-group">
          <div id="predictiveTitle" class="group-title">NMPC 参数</div>
          <div class="compact-grid">
            <div class="control-row">
              <label>horizon <span class="value" id="horizonLabel">28</span></label>
              <input id="horizon" type="range" min="5" max="35" step="1" value="28">
            </div>
            <div class="control-row">
              <label><span data-i18n="levels">候选档位</span> <span class="value" id="levelsLabel">7</span></label>
              <input id="levels" type="range" min="3" max="9" step="2" value="7">
            </div>
            <div class="control-row">
              <label><span data-i18n="posWeight">位置权重</span> <span class="value" id="posWeightLabel">1.2</span></label>
              <input id="posWeight" type="range" min="0.1" max="6" step="0.1" value="1.2">
            </div>
            <div class="control-row">
              <label><span data-i18n="terminalWeight">终端权重</span> <span class="value" id="terminalWeightLabel">13.0</span></label>
              <input id="terminalWeight" type="range" min="0.5" max="20" step="0.5" value="13">
            </div>
            <div class="control-row">
              <label><span data-i18n="velocityWeight">速度权重</span> <span class="value" id="velocityWeightLabel">0.34</span></label>
              <input id="velocityWeight" type="range" min="0" max="3" step="0.01" value="0.34">
            </div>
            <div class="control-row">
              <label><span data-i18n="smoothWeight">平滑权重</span> <span class="value" id="smoothWeightLabel">0.34</span></label>
              <input id="smoothWeight" type="range" min="0" max="2" step="0.01" value="0.34">
            </div>
          </div>
        </div>

        <div id="advancedPredictiveControls" class="control-group">
          <div id="advancedPredictiveTitle" class="group-title">NMPC 高级参数</div>
          <div class="compact-grid">
            <div class="control-row">
              <label><span data-i18n="controlBlocks">控制分段数</span> <span class="value" id="controlBlocksLabel">3</span></label>
              <input id="controlBlocks" type="range" min="2" max="4" step="1" value="3">
            </div>
            <div class="control-row">
              <label><span data-i18n="controlEffortWeight">控制能量权重</span> <span class="value" id="controlEffortWeightLabel">0.04</span></label>
              <input id="controlEffortWeight" type="range" min="0" max="0.3" step="0.01" value="0.04">
            </div>
            <div class="control-row">
              <label><span data-i18n="terminalVelocityMultiplier">终端速度倍率</span> <span class="value" id="terminalVelocityMultiplierLabel">8.0</span></label>
              <input id="terminalVelocityMultiplier" type="range" min="1" max="20" step="0.5" value="8">
            </div>
            <div class="control-row">
              <label><span data-i18n="terminalPositionBoost">终端位置增强</span> <span class="value" id="terminalPositionBoostLabel">4.5</span></label>
              <input id="terminalPositionBoost" type="range" min="0" max="10" step="0.1" value="4.5">
            </div>
            <div class="control-row">
              <label><span data-i18n="terminalVelocityBoost">终端速度增强</span> <span class="value" id="terminalVelocityBoostLabel">18.0</span></label>
              <input id="terminalVelocityBoost" type="range" min="0" max="40" step="1" value="18">
            </div>
            <div class="control-row">
              <label><span data-i18n="settleRadius">收敛半径</span> <span class="value" id="settleRadiusLabel">0.75</span></label>
              <input id="settleRadius" type="range" min="0" max="2" step="0.05" value="0.75">
            </div>
            <div class="control-row">
              <label><span data-i18n="settleWeight">收敛速度权重</span> <span class="value" id="settleWeightLabel">7.5</span></label>
              <input id="settleWeight" type="range" min="0" max="20" step="0.5" value="7.5">
            </div>
            <div class="control-row">
              <label><span data-i18n="holdError">保持误差阈值</span> <span class="value" id="holdErrorLabel">0.035</span></label>
              <input id="holdError" type="range" min="0.005" max="0.2" step="0.005" value="0.035">
            </div>
            <div class="control-row">
              <label><span data-i18n="holdSpeed">保持速度阈值</span> <span class="value" id="holdSpeedLabel">0.045</span></label>
              <input id="holdSpeed" type="range" min="0.005" max="0.2" step="0.005" value="0.045">
            </div>
            <div class="control-row">
              <label><span data-i18n="captureError">捕获误差范围</span> <span class="value" id="captureErrorLabel">0.42</span></label>
              <input id="captureError" type="range" min="0.05" max="1.5" step="0.01" value="0.42">
            </div>
            <div class="control-row">
              <label><span data-i18n="captureSpeed">捕获速度范围</span> <span class="value" id="captureSpeedLabel">0.55</span></label>
              <input id="captureSpeed" type="range" min="0.05" max="2" step="0.01" value="0.55">
            </div>
            <div class="control-row">
              <label><span data-i18n="captureKx">捕获位置增益</span> <span class="value" id="captureKxLabel">5.4</span></label>
              <input id="captureKx" type="range" min="0" max="10" step="0.1" value="5.4">
            </div>
            <div class="control-row">
              <label><span data-i18n="captureKv">捕获速度增益</span> <span class="value" id="captureKvLabel">3.4</span></label>
              <input id="captureKv" type="range" min="0" max="8" step="0.1" value="3.4">
            </div>
            <div class="control-row">
              <label><span data-i18n="captureLimit">捕获控制限幅</span> <span class="value" id="captureLimitLabel">0.50</span></label>
              <input id="captureLimit" type="range" min="0.05" max="1" step="0.05" value="0.5">
            </div>
          </div>
        </div>

        <div id="pidControls" class="control-group hidden">
          <div class="group-title" data-i18n="pidParams">PID 反馈控制参数</div>
          <div class="control-row">
            <label><span data-i18n="kp">比例增益 Kp</span> <span class="value" id="kpLabel">0.34</span></label>
            <input id="kp" type="range" min="0" max="1.5" step="0.01" value="0.34">
          </div>
          <div class="control-row">
            <label><span data-i18n="ki">积分增益 Ki</span> <span class="value" id="kiLabel">0.04</span></label>
            <input id="ki" type="range" min="0" max="0.5" step="0.01" value="0.04">
          </div>
          <div class="control-row">
            <label><span data-i18n="kd">微分增益 Kd</span> <span class="value" id="kdLabel">0.62</span></label>
            <input id="kd" type="range" min="0" max="2.5" step="0.01" value="0.62">
          </div>
          <div class="control-row">
            <label><span data-i18n="integralLimit">积分限幅</span> <span class="value" id="integralLimitLabel">6.0</span></label>
            <input id="integralLimit" type="range" min="0.5" max="20" step="0.5" value="6">
          </div>
        </div>

        <div id="lqrControls" class="control-group hidden">
          <div class="group-title" data-i18n="lqrParams">LQR 状态反馈参数</div>
          <div class="control-row">
            <label><span data-i18n="lqrKx">位置反馈 Kx</span> <span class="value" id="lqrKxLabel">0.32</span></label>
            <input id="lqrKx" type="range" min="0" max="1.5" step="0.01" value="0.32">
          </div>
          <div class="control-row">
            <label><span data-i18n="lqrKv">速度反馈 Kv</span> <span class="value" id="lqrKvLabel">0.86</span></label>
            <input id="lqrKv" type="range" min="0" max="3" step="0.01" value="0.86">
          </div>
        </div>
      </aside>
    </main>

    <div id="infoModal" class="info-modal" hidden role="dialog" aria-modal="true" aria-labelledby="infoTitle">
      <div class="info-card">
        <header>
          <h2 id="infoTitle" data-i18n="infoTitle">控制器说明</h2>
          <button id="infoCloseBtn" class="info-close" type="button" aria-label="Close">×</button>
        </header>
        <div class="info-body">
          <p data-i18n="infoNmpc">NMPC：用非线性模型预测未来。</p>
          <p data-i18n="infoMpc">MPC：用线性模型预测未来。</p>
          <p data-i18n="infoFeedback">LQR/PID：不预测未来，只根据当前状态反馈。</p>
          <p data-i18n="infoSlow">橙色区域：速度约束区，预测控制会提前考虑。</p>
        </div>
      </div>
    </div>
  </div>

  <script src="simulator.js"></script>
</body>
</html>
